version: '3'

dotenv: ['.env']

tasks:
  test:
    desc: Run tests
    cmd: uv run pytest

  typecheck:
    desc: Run ty type checker
    cmd: uv run ty check src/

  check:
    desc: Run tests and type checker
    deps: [test, typecheck]

  build:
    desc: Build distribution packages
    cmd: uv build

  publish:
    desc: "Bump version, publish to PyPI, commit, tag, and cut a GitHub release. Usage: task publish BUMP=patch|minor|major"
    vars:
      BUMP: '{{.BUMP | default "patch"}}'
    cmds:
      - uv run pytest -q
      - uv version --bump {{.BUMP}}
      - uv build
      - uv publish --token $PYPI_TOKEN
      - |
        VERSION=$(uv version --short)
        git add pyproject.toml uv.lock
        git commit -m "chore: release v${VERSION}"
        git tag "v${VERSION}"
        git push && git push --tags
        gh release create "v${VERSION}" dist/* --generate-notes --title "v${VERSION}"

  publish-testpypi:
    desc: Publish to TestPyPI (requires TEST_PYPI_TOKEN env var)
    deps: [build]
    cmd: uv publish --publish-url https://test.pypi.org/legacy/ --token $TEST_PYPI_TOKEN

  clean:
    desc: Remove build artifacts
    cmd: rm -rf dist/
